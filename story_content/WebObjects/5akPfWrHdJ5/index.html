<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: transparent;
        }

        input,
        button {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background: #007bff;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <input type="password" id="token" placeholder="Paste HF Token di sini">
    <input type="text" id="userInput" placeholder="Ketik kalimat...">
    <button onclick="panggilAI()">Analisis Sekarang</button>
    <div id="status">Status: Menunggu...</div>

    <script>
        async function panggilAI() {
            const token = document.getElementById('token').value;
            const text = document.getElementById('userInput').value;
            const statusDiv = document.getElementById('status');
            
            statusDiv.innerText = "Status: Menghubungi AI...";

            try {
                const response = await fetch("https://api-inference.huggingface.co/models/distilbert-base-uncased-finetuned-sst-2-english", {
                    method: "POST",
                    headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
                    body: JSON.stringify({ inputs: text })
                });

                const data = await response.json();

                if (data.error && data.error.includes("loading")) {
                    statusDiv.innerText = "Status: AI sedang bangun, coba lagi 10 detik...";
                } else {
                    const hasil = data[0][0].label;
                    statusDiv.innerText = "Hasil: " + hasil;
                    
                    // Mengirim hasil kembali ke Articulate Storyline
                    if(window.parent.GetPlayer) {
                        const player = window.parent.GetPlayer();
                        player.SetVar("AIResponse", hasil);
                    }
                }
            } catch (err) {
                statusDiv.innerText = "Status: Error - " + err.message;
            }
        }
    </script>
</body>

</html>
